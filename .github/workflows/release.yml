name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write  # Required for OIDC (cosign, SLSA)
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    environment: release  # Requires manual approval in GitHub Settings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts && npm rebuild better-sqlite3

      - name: Run tests
        run: npx vitest run

      # ── SBOM (CycloneDX) ──────────────────────────────────────────────────
      - name: Install CycloneDX npm plugin
        run: npm install --global @cyclonedx/cyclonedx-npm@1.19.3

      - name: Generate SBOM
        run: cyclonedx-npm --output-format json --output-file sbom.cdx.json

      # ── Cosign (sigstore) ─────────────────────────────────────────────────
      - uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1

      - name: Sign SBOM with cosign (keyless via OIDC)
        run: |
          cosign sign-blob --yes \
            --bundle sbom.cdx.json.bundle \
            sbom.cdx.json

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            sbom.cdx.json \
            sbom.cdx.json.bundle
