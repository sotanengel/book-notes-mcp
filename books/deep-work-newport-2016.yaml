summary: |
  深い集中状態（Deep Work）こそが知的労働者の核心的スキルであり、
  希少で価値ある成果を生む唯一の方法。SNSや通知による浅い仕事（Shallow Work）との対比で、
  集中の仕組みを意図的に設計することを提唱する。
key_concepts:
  - name: Deep Work
    description: 認知能力を限界まで使う、集中した状態での職業活動。新しい価値を生み、スキルを向上させ、再現が難しい。
  - name: Shallow Work
    description: 認知負荷が低く、ロジスティクス的なタスク（メール確認、会議など）。Deep Workで生まれた価値を消費する側。
  - name: The 4 Disciplines of Execution (4DX)
    description: 最重要目標への集中・先行指標の追跡・スコアボードの可視化・アカウンタビリティの確保。ビジネスフレームワークを習慣設計に応用。
highlights:
