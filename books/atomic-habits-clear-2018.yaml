summary: |
  行動変容は意志力ではなく「仕組み」で起こる。1%の改善を継続することによる複利効果と、
  アイデンティティを起点とした習慣設計（Cue-Craving-Response-Reward ループ）を中心テーマに据える。
  目標設定より環境設計と仕組みづくりを優先するアプローチが核心。

key_concepts:
  - name: 習慣のループ（Cue-Craving-Response-Reward）
    description: 全ての習慣は4段階で構成される。きっかけ→欲求→反応→報酬。このループを意識的に設計することで習慣を作れる。
    related_to:
      - power-of-habit-duhigg-2012
  - name: アイデンティティベースの習慣
    description: 目標（"本を読む"）ではなくアイデンティティ（"私は読書家だ"）から習慣を設計する。なりたい自分の投票を積み重ねる。
  - name: 1%ルール（複利効果）
    description: 毎日1%の改善を続けると1年で37倍になる。逆に毎日1%悪化すると0.03まで落ちる。小さな変化の長期的影響は大きい。

highlights:
  - id: h-001
    page: 27
    text: You do not rise to the level of your goals. You fall to the level of your systems.
    note: 目標設定より仕組み作りを優先すべき根拠。環境設計の重要性。
    tags:
      - systems-thinking
  - id: h-002
