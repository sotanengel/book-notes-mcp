summary: |
  真のイノベーションは0から1を生む（垂直的進歩）こと。1から nへの模倣（水平的進歩）と対比。
  独占こそが持続的価値創造の源泉であり、競争は破壊的。
  スタートアップは秘密（まだ誰も気づいていない真実）を見つけ、
  それを独占的に解決することで大きな価値を生める。

key_concepts:
  - name: 0から1（垂直的進歩）
    description: 全く新しいものを作ること。既存のものを複製・改善するのではなく、世界に存在しなかった何かを創造する。
  - name: 独占の論理
    description: 競争は利益を破壊する。独自技術・ネットワーク効果・規模の経済・ブランドによる独占が持続的価値の源泉。
  - name: Definite Optimism
    description: 未来は決定可能で、自分が形作れると信じる姿勢。IndefiniteやPessimisticな思考との対比。

